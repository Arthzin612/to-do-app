<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List · Projeto Acadêmico</title>

  <!--
    Google Fonts: Lato
    Carregamos apenas os pesos que usamos (400, 700)
    para não desperdiçar banda do usuário.
    display=swap: exibe a fonte do sistema enquanto
    a Lato carrega (evita texto invisível).
  -->
  <link
    href="https://fonts.googleapis.com/css2?
    family=Lato:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS externo: mantém o HTML limpo -->
  <link rel="stylesheet" href="todo-list.css" />
</head>

<body>

  <!-- ===== CARD PRINCIPAL ===== -->
  <!--
    <main> é o ponto de entrada semântico do
    conteúdo principal. Leitores de tela usam
    landmarks como este para navegação rápida.
  -->
  <main class="card-principal" role="main">


    <!-- ===== CABEÇALHO ===== -->
    <header class="cabecalho">

      <!--
        <h1>: deve existir apenas UM por página.
        Descreve o propósito da página inteira.
      -->
      <h1>📋 Minhas Tarefas</h1>

      <!--
        <p> aqui é metadata visual: versão e
        contexto do projeto. Não é um heading
        porque não descreve uma seção nova.
      -->
      <p>Projeto Acadêmico · Engenharia de Prompt · v1.0</p>

    </header>
    <!-- /CABEÇALHO -->


    <!-- ===== FORMULÁRIO (VISUAL / DECORATIVO) ===== -->
    <!--
      NOTA TÉCNICA IMPORTANTE:
      Este formulário é VISUAL APENAS nesta versão.
      Adicionar tarefas dinamicamente ao DOM exige
      JavaScript — uma limitação conhecida e documentada
      do escopo CSS-only deste projeto.

      Mantemos a estrutura HTML correta para:
      1. Demonstrar que sabemos como seria implementado
      2. O layout ficar completo e profissional
      3. A acessibilidade do formulário estar correta
         (para quando JS for adicionado futuramente)

      aria-label no fieldset explica o propósito
      do grupo de controles para leitores de tela.
    -->
    <section
      class="area-formulario"
      aria-label="Adicionar nova tarefa (recurso indisponível nesta versão)"
    >

      <div class="formulario" role="group">

        <!--
          aria-label em inputs cujo <label> está
          ausente ou distante. Aqui não há <label>
          visível, então aria-label é obrigatório
          para acessibilidade.
        -->
        <input
          class="formulario__input"
          type="text"
          placeholder="Nova tarefa..."
          aria-label="Texto da nova tarefa"
          disabled
          title="Adicionar tarefas requer JavaScript"
        />

        <!--
          <select> para prioridade.
          O aria-label descreve o propósito porque
          não há <label> visível associado.
        -->
        <select
          class="formulario__select"
          aria-label="Prioridade da nova tarefa"
          disabled
        >
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Média</option>
          <option value="baixa">🟢 Baixa</option>
        </select>

        <!--
          O botão "+" sem contexto não diz nada.
          aria-label torna o propósito explícito
          para tecnologias assistivas.
        -->
        <button
          class="formulario__botao"
          aria-label="Adicionar nova tarefa"
          disabled
          title="Recurso disponível com JavaScript"
        >
          +
        </button>

      </div>

    </section>
    <!-- /FORMULÁRIO -->


    <!-- ===== LISTA DE TAREFAS ===== -->
    <!--
      Dividimos em <section> por categoria.
      Cada <section> tem um <h2> que a descreve.
      aria-labelledby conecta a section ao seu h2:
      leitores de tela anunciam "Seção: Faculdade"
      ao entrar na region.
    -->


    <!-- CATEGORIA: FACULDADE -->
    <section
      class="secao-categoria"
      aria-labelledby="titulo-faculdade"
    >

      <h2
        class="secao-categoria__titulo"
        id="titulo-faculdade"
      >
        🎓 Faculdade
      </h2>

      <!--
        role="list" é necessário porque aplicamos
        list-style: none no CSS. Sem ele, o Safari
        com VoiceOver remove a semântica de lista.
      -->
      <ul class="lista-tarefas" role="list">


        <!-- TAREFA 1: Alta prioridade, não concluída -->
        <!--
          ESTRUTURA DE CADA ITEM — REGRA DE OURO:
          O <input> DEVE VIR ANTES do <label> no HTML.
          O seletor CSS "input:checked + label" usa
          o operador + (irmão adjacente), que só
          funciona para o elemento IMEDIATAMENTE APÓS.
          Se o label vier antes, o CSS não funciona.
        -->
        <li
          class="item-tarefa prioridade-alta"
          role="listitem"
        >

          <!--
            id="t1": deve ser único na página inteira.
            Conecta com o for="t1" do label abaixo.
            Convenção: "t" de tarefa + número sequencial.
          -->
          <input
            type="checkbox"
            id="t1"
            aria-describedby="prioridade-t1"
          />

          <!--
            for="t1": conecta este label ao input t1.
            Clicar em qualquer parte deste label
            alterna o estado do checkbox t1.
          -->
          <label for="t1">

            <span class="item-tarefa__texto">
              Entregar relatório de Eng. de Prompt
            </span>

            <!--
              O badge é um span DENTRO do label.
              Isso é intencional: quando o label
              recebe text-decoration: line-through,
              o risco afeta todo o conteúdo do label,
              incluindo o texto do badge.
              
              id para aria-describedby do input acima.
            -->
            <span
              class="badge"
              id="prioridade-t1"
              aria-label="Prioridade: Alta"
            >
              Alta
            </span>

          </label>

        </li>
        <!-- /TAREFA 1 -->


        <!-- TAREFA 2: Média prioridade, não concluída -->
        <li
          class="item-tarefa prioridade-media"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t2"
            aria-describedby="prioridade-t2"
          />

          <label for="t2">

            <span class="item-tarefa__texto">
              Estudar seletores CSS avançados (:has, ~)
            </span>

            <span
              class="badge"
              id="prioridade-t2"
              aria-label="Prioridade: Média"
            >
              Média
            </span>

          </label>

        </li>
        <!-- /TAREFA 2 -->


        <!-- TAREFA 3: Baixa prioridade, CONCLUÍDA -->
        <!--
          O atributo "checked" no HTML marca o
          checkbox como concluído desde o carregamento.
          Isso demonstra visualmente o estado final
          do Checkbox Hack sem precisar interagir.
        -->
        <li
          class="item-tarefa prioridade-baixa"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t3"
            checked
            aria-describedby="prioridade-t3"
          />

          <label for="t3">

            <span class="item-tarefa__texto">
              Criar estrutura base do HTML semântico
            </span>

            <span
              class="badge"
              id="prioridade-t3"
              aria-label="Prioridade: Baixa"
            >
              Baixa
            </span>

          </label>

        </li>
        <!-- /TAREFA 3 -->


        <!-- TAREFA 4: Alta prioridade, não concluída -->
        <li
          class="item-tarefa prioridade-alta"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t4"
            aria-describedby="prioridade-t4"
          />

          <label for="t4">

            <span class="item-tarefa__texto">
              Revisar conceitos de acessibilidade WCAG
            </span>

            <span
              class="badge"
              id="prioridade-t4"
              aria-label="Prioridade: Alta"
            >
              Alta
            </span>

          </label>

        </li>
        <!-- /TAREFA 4 -->


      </ul>

    </section>
    <!-- /CATEGORIA: FACULDADE -->


    <!-- CATEGORIA: PESSOAL -->
    <section
      class="secao-categoria"
      aria-labelledby="titulo-pessoal"
    >

      <h2
        class="secao-categoria__titulo"
        id="titulo-pessoal"
      >
        🌱 Pessoal
      </h2>

      <ul class="lista-tarefas" role="list">


        <!-- TAREFA 5: Média prioridade, concluída -->
        <li
          class="item-tarefa prioridade-media"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t5"
            checked
            aria-describedby="prioridade-t5"
          />

          <label for="t5">

            <span class="item-tarefa__texto">
              Tomar café da manhã
            </span>

            <span
              class="badge"
              id="prioridade-t5"
              aria-label="Prioridade: Média"
            >
              Média
            </span>

          </label>

        </li>
        <!-- /TAREFA 5 -->


        <!-- TAREFA 6: Baixa prioridade, não concluída -->
        <li
          class="item-tarefa prioridade-baixa"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t6"
            aria-describedby="prioridade-t6"
          />

          <label for="t6">

            <span class="item-tarefa__texto">
              Ler 30 minutos de livro técnico
            </span>

            <span
              class="badge"
              id="prioridade-t6"
              aria-label="Prioridade: Baixa"
            >
              Baixa
            </span>

          </label>

        </li>
        <!-- /TAREFA 6 -->


        <!-- TAREFA 7: Alta prioridade, não concluída -->
        <li
          class="item-tarefa prioridade-alta"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t7"
            aria-describedby="prioridade-t7"
          />

          <label for="t7">

            <span class="item-tarefa__texto">
              Caminhar 20 minutos ao ar livre
            </span>

            <span
              class="badge"
              id="prioridade-t7"
              aria-label="Prioridade: Alta"
            >
              Alta
            </span>

          </label>

        </li>
        <!-- /TAREFA 7 -->


      </ul>

    </section>
    <!-- /CATEGORIA: PESSOAL -->


    <!-- CATEGORIA: PROJETOS -->
    <section
      class="secao-categoria"
      aria-labelledby="titulo-projetos"
    >

      <h2
        class="secao-categoria__titulo"
        id="titulo-projetos"
      >
        💻 Projetos
      </h2>

      <ul class="lista-tarefas" role="list">


        <!-- TAREFA 8: Média prioridade, não concluída -->
        <li
          class="item-tarefa prioridade-media"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t8"
            aria-describedby="prioridade-t8"
          />

          <label for="t8">

            <span class="item-tarefa__texto">
              Publicar projeto no GitHub Pages
            </span>

            <span
              class="badge"
              id="prioridade-t8"
              aria-label="Prioridade: Média"
            >
              Média
            </span>

          </label>

        </li>
        <!-- /TAREFA 8 -->


        <!-- TAREFA 9: Baixa prioridade, não concluída -->
        <li
          class="item-tarefa prioridade-baixa"
          role="listitem"
        >

          <input
            type="checkbox"
            id="t9"
            aria-describedby="prioridade-t9"
          />

          <label for="t9">

            <span class="item-tarefa__texto">
              Documentar o Checkbox Hack no README
            </span>

            <span
              class="badge"
              id="prioridade-t9"
              aria-label="Prioridade: Baixa"
            >
              Baixa
            </span>

          </label>

        </li>
        <!-- /TAREFA 9 -->


      </ul>

    </section>
    <!-- /CATEGORIA: PROJETOS -->


    <!-- ===== RODAPÉ DO CARD ===== -->
    <footer class="rodape">
      <p>HTML5 + CSS3 · Zero JavaScript · WCAG AA</p>
    </footer>
    <!-- /RODAPÉ -->


  </main>
  <!-- /CARD PRINCIPAL -->


</body>
</html>
